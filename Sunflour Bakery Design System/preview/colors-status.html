<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:22px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .row{display:flex;align-items:center;gap:12px}
  .badge{display:inline-flex;align-items:center;border-radius:var(--radius-pill);border:1px solid;padding:5px 12px;font-size:12px;font-weight:700}
  .nm{font-size:12px;font-weight:700}
  .hex{font-size:11px;color:var(--color-text-soft)}
</style>
</head>
<body>
  <div class="grid">
    <div class="row"><span class="badge" style="border-color:#128c4a;background:#e7f7ee;color:#128c4a">Payment confirmed</span><div><div class="nm">success</div><div class="hex">#128C4A</div></div></div>
    <div class="row"><span class="badge" style="border-color:#b7791f;background:#fff4d6;color:#b7791f">Pending payment</span><div><div class="nm">warning</div><div class="hex">#B7791F</div></div></div>
    <div class="row"><span class="badge" style="border-color:#c81e1e;background:#ffe8e8;color:#c81e1e">Rejected</span><div><div class="nm">danger</div><div class="hex">#C81E1E</div></div></div>
    <div class="row"><span class="badge" style="border-color:#0b6fff;background:#fffaf0;color:#0b6fff">Under review</span><div><div class="nm">info / focus</div><div class="hex">#0B6FFF</div></div></div>
  </div>
</body>
</html>
