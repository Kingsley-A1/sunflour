<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);color:var(--color-text);padding:22px;display:flex;gap:24px;align-items:center}
  .logo{height:88px;width:auto;object-fit:contain}
  .chip{height:88px;width:88px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--color-bg);border:1px solid var(--color-border);padding:8px}
  .chip img{max-height:100%;max-width:100%;object-fit:contain}
  .note{font-size:13px;color:var(--color-text-muted);max-width:230px;line-height:1.5}
  .note b{color:var(--color-text)}
</style>
</head>
<body>
  <img class="logo" src="../assets/logo.png" alt="Sunflour Bakery logo">
  <div class="chip"><img src="../assets/logo.png" alt="Logo in 44px header context"></div>
  <p class="note"><b>Never recreate, recolor, or distort.</b> Red brush-script wordmark, black wheat stalks, yellow sun-ray arc. Sits at 44×44 in the header, object-contain.</p>
</body>
</html>
