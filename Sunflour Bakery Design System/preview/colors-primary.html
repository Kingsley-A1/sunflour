<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:24px;display:grid;gap:16px}
  .ramp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .step{height:72px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;font-size:11px;font-weight:700}
  .step .hex{font-weight:500;opacity:.85;font-variant-numeric:tabular-nums}
  .note{font-size:12px;color:var(--color-text-muted)}
  .accent{display:flex;align-items:center;gap:12px}
  .pill{padding:7px 14px;border-radius:var(--radius-pill);font-size:12px;font-weight:700}
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:#e60000">primary<span class="hex">#E60000</span></div>
    <div class="step" style="background:#c91414">hover<span class="hex">#C91414</span></div>
    <div class="step" style="background:#a80f0f">pressed<span class="hex">#A80F0F</span></div>
  </div>
  <div class="note">One primary action per screen. Red carries it; hover and pressed each darken a step.</div>
  <div class="accent">
    <span class="pill" style="background:#ffd400;color:#21140a">Accent · #FFD400</span>
    <span class="pill" style="background:#fff3b0;color:#21140a">Accent soft · #FFF3B0</span>
    <span class="note" style="margin:0">Yellow is a garnish — small highlights & selection only.</span>
  </div>
</body>
</html>
