<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);color:var(--color-text);padding:24px;display:grid;gap:12px}
  .line{display:flex;align-items:center;gap:14px}
  .dot{width:34px;height:34px;border-radius:50%;flex:0 0 auto;border:1px solid rgb(33 20 10 /.08)}
  .lab{font-size:13px;font-weight:700;flex:0 0 120px}
  .ex{font-size:15px}
  .hex{margin-left:auto;font-size:11px;color:var(--color-text-soft);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="line"><span class="dot" style="background:#21140a"></span><span class="lab">text</span><span class="ex" style="color:#21140a;font-weight:700">Order created</span><span class="hex">#21140A</span></div>
  <div class="line"><span class="dot" style="background:#6f5842"></span><span class="lab">text-muted</span><span class="ex" style="color:#6f5842">Choose pickup or delivery</span><span class="hex">#6F5842</span></div>
  <div class="line"><span class="dot" style="background:#8a735b"></span><span class="lab">text-soft</span><span class="ex" style="color:#8a735b">Enter your phone number</span><span class="hex">#8A735B</span></div>
  <div class="line"><span class="dot" style="background:#e60000"></span><span class="lab">primary</span><span class="ex" style="color:#e60000;font-weight:700">Add to cart</span><span class="hex">#E60000</span></div>
</body>
</html>
