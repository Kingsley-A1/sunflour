<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:20px;display:flex;gap:16px}
  .card{width:240px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);box-shadow:var(--shadow-soft);overflow:hidden;display:grid}
  .well{aspect-ratio:4/3;background:var(--color-surface-soft);overflow:hidden}
  .well img{width:100%;height:100%;object-fit:cover}
  .body{display:grid;gap:10px;padding:14px}
  .pills{display:flex;gap:6px}
  .badge{display:inline-flex;align-items:center;border-radius:var(--radius-pill);border:1px solid;padding:3px 9px;font-size:11px;font-weight:700}
  .warn{border-color:var(--color-warning);background:var(--color-warning-soft);color:var(--color-warning)}
  .ok{border-color:var(--color-success);background:var(--color-success-soft);color:var(--color-success)}
  .name{font-size:18px;font-weight:800;line-height:1.2}
  .desc{font-size:13px;color:var(--color-text-muted);line-height:1.45;margin:0}
  .price{font-size:14px;color:var(--color-text-muted)}
  .price b{font-size:16px;color:var(--color-text);font-weight:800;font-variant-numeric:tabular-nums}
  .cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;border-radius:var(--radius-sm);background:var(--color-primary);color:#fff;font-weight:600;font-size:14px;border:0;cursor:pointer}
  .cta i{width:16px;height:16px}
</style>
</head>
<body>
  <article class="card">
    <div class="well"><img src="../assets/food-cake.png" alt="Chocolate cake"></div>
    <div class="body">
      <div class="pills"><span class="badge warn">Popular</span><span class="badge ok">Active</span></div>
      <div class="name">7-inch chocolate cake</div>
      <p class="desc">Rich layered sponge with chocolate ganache. Made fresh to order.</p>
      <div class="price">From <b>₦10,000</b></div>
      <button class="cta"><i data-lucide="shopping-bag"></i>Add to cart</button>
    </div>
  </article>
  <article class="card">
    <div class="well"><img src="../assets/food-pizza.png" alt="Pepperoni pizza"></div>
    <div class="body">
      <div class="pills"><span class="badge ok">Active</span></div>
      <div class="name">Pepperoni pizza</div>
      <p class="desc">Sauce, cheese, pepperoni. Available small to family size.</p>
      <div class="price">From <b>₦7,500</b></div>
      <button class="cta"><i data-lucide="shopping-bag"></i>Add to cart</button>
    </div>
  </article>
  <script>lucide.createIcons()</script>
</body>
</html>
