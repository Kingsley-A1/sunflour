<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:22px;display:grid;gap:14px;max-width:380px}
  label{font-size:14px;font-weight:600}
  .field{display:grid;gap:6px}
  .help{font-size:13px;color:var(--color-text-muted);margin:0}
  input{min-height:44px;border-radius:var(--radius-sm);border:1px solid var(--color-border);background:var(--color-surface);padding:0 12px;font:inherit;color:var(--color-text);outline:none}
  input::placeholder{color:var(--color-text-soft)}
  input:focus{border-color:var(--color-focus);outline:3px solid var(--color-focus);outline-offset:2px}
  .err input{border-color:var(--color-danger)}
  .errmsg{font-size:13px;font-weight:500;color:var(--color-danger);margin:0}
</style>
</head>
<body>
  <div class="field">
    <label for="a">Phone number</label>
    <p class="help">We use this to confirm your order on WhatsApp.</p>
    <input id="a" placeholder="0801 234 5678">
  </div>
  <div class="field err">
    <label for="b">Delivery location</label>
    <input id="b" value="" placeholder="Choose your delivery location">
    <p class="errmsg">Choose your delivery location.</p>
  </div>
</body>
</html>
