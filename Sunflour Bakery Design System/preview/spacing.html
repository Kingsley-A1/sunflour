<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:22px;display:grid;gap:6px}
  .row{display:flex;align-items:center;gap:12px}
  .bar{background:var(--color-primary);height:14px;border-radius:3px}
  .nm{font-size:11px;font-weight:700;flex:0 0 84px}
  .px{font-size:11px;color:var(--color-text-soft);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="row"><span class="nm">space-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
  <div class="row"><span class="nm">space-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="row"><span class="nm">space-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
  <div class="row"><span class="nm">space-4</span><span class="bar" style="width:16px"></span><span class="px">16px · gutter</span></div>
  <div class="row"><span class="nm">space-6</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
  <div class="row"><span class="nm">space-8</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
  <div class="row"><span class="nm">space-12</span><span class="bar" style="width:48px"></span><span class="px">48px</span></div>
  <div class="row"><span class="nm">space-16</span><span class="bar" style="width:64px"></span><span class="px">64px</span></div>
</body>
</html>
