<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:22px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:end}
  .box{background:var(--color-surface);border:1px solid var(--color-border);height:90px}
  .cap{font-size:11px;font-weight:700;margin-top:8px}
  .sub{font-size:10px;color:var(--color-text-soft)}
</style>
</head>
<body>
  <div class="grid">
    <div><div class="box" style="border-radius:10px;box-shadow:0 8px 24px rgb(33 20 10 /.08)"></div><div class="cap">shadow-soft</div><div class="sub">cards · default lift</div></div>
    <div><div class="box" style="border-radius:14px;box-shadow:0 12px 32px rgb(33 20 10 /.10)"></div><div class="cap">shadow-card</div><div class="sub">sticky bars · raised</div></div>
    <div><div class="box" style="border-radius:18px;box-shadow:0 24px 80px rgb(33 20 10 /.22)"></div><div class="cap">shadow-modal</div><div class="sub">dialogs · sheets</div></div>
  </div>
</body>
</html>
