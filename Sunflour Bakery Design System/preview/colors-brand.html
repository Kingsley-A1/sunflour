<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:22px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{display:grid;gap:6px}
  .chip{height:64px;border-radius:var(--radius-md);border:1px solid rgb(33 20 10 / .08)}
  .nm{font-size:12px;font-weight:700}
  .hex{font-size:11px;color:var(--color-text-soft);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#f00000"></div><span class="nm">Logo red</span><span class="hex">#F00000</span></div>
    <div class="sw"><div class="chip" style="background:#b91c1c"></div><span class="nm">Deep red</span><span class="hex">#B91C1C</span></div>
    <div class="sw"><div class="chip" style="background:#ffd400"></div><span class="nm">Warm yellow</span><span class="hex">#FFD400</span></div>
    <div class="sw"><div class="chip" style="background:#f4c400"></div><span class="nm">Golden yellow</span><span class="hex">#F4C400</span></div>
    <div class="sw"><div class="chip" style="background:#111111"></div><span class="nm">Ink black</span><span class="hex">#111111</span></div>
    <div class="sw"><div class="chip" style="background:#fff8ea"></div><span class="nm">Warm cream</span><span class="hex">#FFF8EA</span></div>
    <div class="sw"><div class="chip" style="background:#fff1c9"></div><span class="nm">Soft wheat</span><span class="hex">#FFF1C9</span></div>
    <div class="sw"><div class="chip" style="background:#ffffff"></div><span class="nm">Fresh white</span><span class="hex">#FFFFFF</span></div>
  </div>
</body>
</html>
