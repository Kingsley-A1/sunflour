<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:22px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .cell{display:grid;gap:2px}
  .w{font-size:26px;line-height:1.1}
  .n{font-size:11px;font-weight:600;color:var(--color-text-soft)}
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><span class="w" style="font-weight:400">Sunflour</span><span class="n">400 Regular · body</span></div>
    <div class="cell"><span class="w" style="font-weight:500">Sunflour</span><span class="n">500 Medium</span></div>
    <div class="cell"><span class="w" style="font-weight:600">Sunflour</span><span class="n">600 Semibold · labels</span></div>
    <div class="cell"><span class="w" style="font-weight:700">Sunflour</span><span class="n">700 Bold · h3</span></div>
    <div class="cell"><span class="w" style="font-weight:800">Sunflour</span><span class="n">800 Extrabold · headings</span></div>
    <div class="cell"><span class="w" style="font-weight:900">Sunflour</span><span class="n">900 Black · emphasis</span></div>
  </div>
</body>
</html>
